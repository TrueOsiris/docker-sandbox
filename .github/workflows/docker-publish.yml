# .github/workflows/docker-publish.yml
# Author: Tim Chaubet

name: Build and Push Sandbox Image

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - 'scripts/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/sandbox
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/docker-sandbox

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/sandbox:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/docker-sandbox:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/sandbox:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/docker-sandbox:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          pull: true